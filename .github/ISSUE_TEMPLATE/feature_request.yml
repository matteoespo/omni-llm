name: ✨ Feature Request
description: Suggest a new feature or improvement for Omni-LLM
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea clearly so we can evaluate and discuss it.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Pre-flight Checklist
      description: Please confirm the following before submitting.
      options:
        - label: I have searched the [existing issues](https://github.com/matteoespo/lazy-llm/issues) and this feature has not been requested yet.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is this feature request related to a problem? Describe it clearly.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Include API examples or pseudocode if helpful.
      placeholder: |
        I would like an API like:
        ```python
        from omnillm import ...
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
      placeholder: Describe alternatives...
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: What area of Omni-LLM does this feature relate to?
      multiple: true
      options:
        - Core API
        - Ollama backend
        - llama.cpp backend
        - CLI
        - Server / FastAPI
        - Documentation
        - Testing
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or references about the feature request here.
      placeholder: Any additional information...
    validations:
      required: false
