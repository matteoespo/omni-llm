name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Omni-LLM
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below to help us reproduce and fix the issue.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Pre-flight Checklist
      description: Please confirm the following before submitting.
      options:
        - label: I have searched the [existing issues](https://github.com/matteoespo/lazy-llm/issues) and this bug has not been reported yet.
          required: true
        - label: I am using the latest version of Omni-LLM.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal set of steps to reproduce the issue.
      placeholder: |
        1. Install omni-llm with `pip install omni-llm`
        2. Run the following code:
        ```python
        from omnillm import ...
        ```
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages and tracebacks if applicable.
      placeholder: Describe the actual behavior...
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: LLM Backend
      description: Which backend were you using?
      multiple: true
      options:
        - Ollama
        - llama.cpp
        - Both
        - Not applicable
    validations:
      required: true

  - type: input
    id: omni-llm-version
    attributes:
      label: Omni-LLM Version
      description: "Run `pip show omni-llm` to find the version."
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Run `python --version` to find the version."
      placeholder: "e.g. 3.12.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or log output about the problem here.
      placeholder: Any additional information...
    validations:
      required: false
