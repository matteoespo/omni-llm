name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/matteoespo/lazy-llm/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: "🚀 Features"
    labels:
      - "enhancement"
      - "feature"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "bugfix"
  - title: "📖 Documentation"
    labels:
      - "documentation"
  - title: "🧹 Maintenance"
    labels:
      - "maintenance"
      - "refactor"
      - "ci/cd"
  - title: "📦 Dependencies"
    labels:
      - "dependencies"
  - title: "💥 Breaking Changes"
    labels:
      - "breaking-change"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
no-changes-template: "- No changes"

version-resolver:
  major:
    labels:
      - "breaking-change"
  minor:
    labels:
      - "enhancement"
      - "feature"
  patch:
    labels:
      - "bug"
      - "bugfix"
      - "maintenance"
      - "dependencies"
      - "documentation"
  default: patch

exclude-labels:
  - "skip-changelog"

autolabeler:
  - label: "documentation"
    files:
      - "*.md"
      - "docs/**"
  - label: "bug"
    branch:
      - '/fix\/.+/'
      - '/bug\/.+/'
  - label: "enhancement"
    branch:
      - '/feat\/.+/'
      - '/feature\/.+/'
